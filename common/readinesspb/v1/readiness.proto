syntax = "proto3";

package common.readinesspb.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/yanet-platform/yanet2/common/readinesspb/v1;readinesspb";

// ReadyRequest selects which scopes to query.
//
// If the scopes list is empty, the component returns the state of every known
// scope. Otherwise only the named scopes are returned.
message ReadyRequest {
  // If empty, return state for all known scopes.
  // Otherwise, return only the requested scopes.
  repeated string scopes = 1;
}

message ReadyResponse { repeated Scope scopes = 1; }

// Scope describes the readiness of a single logical dimension within the
// component.
message Scope {
  string name = 1;
  State state = 2;
  // Human-readable reasons explaining why the scope is not READY.
  repeated Reason reasons = 3;
  // Timestamp of the last observation, used for detecting stale answers.
  google.protobuf.Timestamp observed_at = 4;
  // Timestamp of the last state transition for this scope.
  google.protobuf.Timestamp last_transition_time = 5;
}

enum State {
  STATE_UNSPECIFIED = 0;
  STATE_READY = 1;
  STATE_DEGRADED = 2;
  STATE_NOT_READY = 3;
  STATE_UNKNOWN = 4;
}

message Reason {
  string code = 1;
  string message = 2;
}
