version: v2
modules:
  - path: .
    excludes:
      - subprojects
      - .claude
lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - SERVICE_SUFFIX
  ignore_only:
    PACKAGE_DIRECTORY_MATCH:
      - modules/route-mpls
      - operators/bird-adapter
    ENUM_VALUE_UPPER_SNAKE_CASE:
      - common/filterpb
breaking:
  use:
    - PACKAGE
  ignore:
    - modules/balancer2
