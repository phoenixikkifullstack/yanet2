version: v2
modules:
  - path: .
    excludes:
      - subprojects
      # Modules not yet migrated.
      - controlplane
lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - SERVICE_SUFFIX
  ignore_only:
    PACKAGE_DIRECTORY_MATCH:
      - modules/route-mpls
      - operators/bird-adapter
  ignore:
    - common
breaking:
  use:
    - PACKAGE
