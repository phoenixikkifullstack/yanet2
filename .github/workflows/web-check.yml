name: Web Check

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "modules/**/web/**"
      - "devices/**/web/**"
      - "operators/**/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-check.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"
      - "modules/**/web/**"
      - "devices/**/web/**"
      - "operators/**/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-check.yml"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - run: npm ci
      - run: npx tsc --noEmit -p web/tsconfig.json
      - run: npm run test -w web
