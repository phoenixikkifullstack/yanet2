name: Proto Lint

on:
  push:
    paths:
      - '**/*.proto'
      - 'lint/protobuf/**'
      - 'buf.yaml'
      - '.github/workflows/proto-lint.yml'
  pull_request:
    paths:
      - '**/*.proto'
      - 'lint/protobuf/**'
      - 'buf.yaml'
      - '.github/workflows/proto-lint.yml'

jobs:
  buf-lint:
    name: Buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Run buf lint
        run: buf lint

  buf-breaking:
    name: Buf breaking
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Run buf breaking
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main"

  protolint:
    name: Custom protolint linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./lint/protobuf/cmd/protolint/

      - name: Run linter
        run: |
          go run ./lint/protobuf/cmd/protolint/ --exclude subprojects
