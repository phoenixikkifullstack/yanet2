syntax = "proto3";

package modules.acl.controlplane.aclpb.v1;

import "common/filterpb/v1/filter.proto";
import "common/commonpb/v1/metric.proto";

option go_package = "github.com/yanet-platform/yanet2/modules/acl/controlplane/aclpb/v1;aclpb";

// ACLService is a service for ACL module.
service ACLService {
  // Updates the complete ACL configuration with a new set of rules
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  // Allows to delete acl config if it is not referenced
  // by any pipeline.
  rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse);
  // Show specific ACL configuration
  rpc ShowConfig(ShowConfigRequest) returns (ShowConfigResponse);
  // List all ACL configurations across instances
  rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);
  // Returns module-level metrics
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
}

message UpdateConfigRequest {
  string name = 1;
  repeated Rule rules = 2;
}

message UpdateConfigResponse {}

message ShowConfigRequest { string name = 1; }

message ShowConfigResponse {
  string name = 1;
  repeated Rule rules = 2;
  string fwstate_name = 3;
}

message Rule {
  repeated Action actions = 1;
  string counter = 2;

  repeated common.filterpb.v1.Device devices = 3;
  repeated common.filterpb.v1.VlanRange vlan_ranges = 4;
  repeated common.filterpb.v1.IPNet srcs = 5;
  repeated common.filterpb.v1.IPNet dsts = 6;
  repeated common.filterpb.v1.ProtoRange proto_ranges = 7;
  repeated common.filterpb.v1.PortRange src_port_ranges = 8;
  repeated common.filterpb.v1.PortRange dst_port_ranges = 9;
  common.filterpb.v1.Fragment fragment = 10;
}

message Action { ActionKind kind = 1; }

// Defines possible actions for matched traffic
enum ActionKind {
  ACTION_KIND_PASS = 0;
  ACTION_KIND_DENY = 1;
  ACTION_KIND_COUNT = 2;
  ACTION_KIND_CHECK_STATE = 4;
  ACTION_KIND_CREATE_STATE = 5;
  ACTION_KIND_LOG = 6;
}

// Delete config with specified name.
message DeleteConfigRequest {
  // Specifies module name and
  // dataplane instance of acl agent to delete.
  string name = 1;
}

message DeleteConfigResponse { bool deleted = 1; }

message ListConfigsRequest {}

message ListConfigsResponse { repeated string configs = 1; }

message GetMetricsRequest {}

message GetMetricsResponse { repeated common.commonpb.v1.Metric metrics = 1; }
